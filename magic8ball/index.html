<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div id="app"></div>

<script>

    let answer = ""; 
    let answers = [
        "Yes, absoloutley",
        "No",
        "Definitley",
        "Without a doubt",
        "Better not say",
        "Very unlikely",
        "Ask again later",
        "Maybe"
    ];

    updateView();

    function updateView() {
        document.getElementById("app").innerHTML = /*HTML*/ `

        <h2>Magic 8 Ball</h2> 

        <input id="questionsInput" type="text" placeholder="Ask a question"> 

        <button onclick="askBall()">
            Ask the Magic Ball
            </button> 

            <h3>${answer}</h3> 
            `; 
    }

    function askBall() {
        let randomIndex = Math.floor(Math.random() * answers.length); 

        answer = answers[randomIndex]; 

        updateView(); 
    }

</script>
</body>
</html>
